<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>y.r.s | Pro Engine</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        /* --- DESIGN SYSTEM --- */
        :root {
            --bg-color: #020205;
            --text-color: #ffffff;
            --glass-bg: rgba(10, 15, 30, 0.45);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-blur: blur(20px);
            --accent: #00ffcc;
            --neon-pink: #ff00cc;
            --neon-blue: #3333ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Inter', 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
            height: 100vh;
        }

        /* --- VISUAL LAYERING --- */
        .viewport {
            position: absolute;
            inset: 0;
            z-index: -1;
        }

        .input_video {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            filter: brightness(0.5) contrast(1.2) saturate(0.8);
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: scaleX(-1);
            pointer-events: none;
        }

        #bgCanvas { z-index: 1; }
        #mainCanvas { z-index: 5; }

        /* --- UI COMPONENTS --- */
        #hud {
            position: absolute;
            top: 30px;
            left: 30px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 20px;
            pointer-events: none;
            transition: 0.5s ease;
        }

        .panel {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.6);
            border-left: 4px solid var(--accent);
        }

        .panel h3 {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 12px;
            color: rgba(255,255,255,0.4);
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            min-width: 200px;
            margin-bottom: 8px;
        }

        .stat-label { font-size: 0.9rem; color: rgba(255,255,255,0.7); }
        .stat-value { font-family: monospace; font-weight: 700; color: var(--accent); }

        #themes {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            gap: 12px;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            padding: 10px;
        }

        .theme-btn {
            background: transparent;
            border: 1px solid transparent;
            color: white;
            padding: 10px 22px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .theme-btn:hover { background: rgba(255,255,255,0.1); }
        .theme-btn.active {
            background: rgba(255,255,255,0.15);
            border-color: rgba(255,255,255,0.3);
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.2);
        }

        /* --- START OVERLAY --- */
        #startOverlay {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, #101025 0%, #020205 100%);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .logo-text {
            font-size: 5rem;
            font-weight: 200;
            letter-spacing: 20px;
            margin-bottom: 20px;
            background: linear-gradient(to right, #fff, #555);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .start-btn {
            position: relative;
            padding: 20px 60px;
            font-size: 1.1rem;
            color: white;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 4px;
            cursor: pointer;
            overflow: hidden;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        .start-btn:hover {
            border-color: var(--accent);
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.3);
            letter-spacing: 6px;
        }

        .hidden { 
            opacity: 0 !important; 
            pointer-events: none !important; 
            transform: scale(1.1);
        }

        /* --- GESTURE ALERTS --- */
        #gesture-toast {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 8rem;
            font-weight: 900;
            color: white;
            opacity: 0;
            pointer-events: none;
            z-index: 200;
            text-transform: uppercase;
            font-style: italic;
            -webkit-text-stroke: 2px var(--accent);
        }

        @keyframes toastPop {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            20% { opacity: 0.8; transform: translate(-50%, -50%) scale(1.1); }
            80% { opacity: 0.8; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.2); }
        }
    </style>
</head>
<body>

    <div id="startOverlay">
        <div class="logo-text">Y.R.S</div>
        <p style="margin-bottom: 50px; color: #666; letter-spacing: 2px;">NEURAL HAND TRACKING v4.0</p>
        <button class="start-btn" id="startBtn">Initialize</button>
    </div>

    <div id="gesture-toast">SNAP</div>

    <div class="viewport">
        <video class="input_video" autoplay playsinline></video>
        <canvas id="bgCanvas"></canvas>
        <canvas id="mainCanvas"></canvas>
    </div>

    <div id="hud" class="hidden">
        <div class="panel">
            <h3>System Status</h3>
            <div class="stat-row">
                <span class="stat-label">Neural Engine</span>
                <span class="stat-value" id="ui-fps">0 FPS</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">Hand Count</span>
                <span class="stat-value" id="ui-hands">0</span>
            </div>
        </div>
        <div class="panel">
            <h3>Gesture Analysis</h3>
            <div class="stat-row">
                <span class="stat-label">Active State</span>
                <span class="stat-value" id="ui-gesture">Idle</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">Flex Tension</span>
                <span class="stat-value" id="ui-spread">0%</span>
            </div>
        </div>
    </div>

    <div id="themes" class="hidden">
        <button class="theme-btn active" data-theme="Rainbow">Prism</button>
        <button class="theme-btn" data-theme="Cyberpunk">NightCity</button>
        <button class="theme-btn" data-theme="Lava">Inferno</button>
        <button class="theme-btn" data-theme="Ocean">DeepSea</button>
        <button class="theme-btn" data-theme="Galaxy">Nebula</button>
    </div>

<script>
/**
 * --- CORE ENGINE CONFIGURATION ---
 */
const videoElement = document.querySelector('.input_video');
const bgCanvas = document.getElementById('bgCanvas');
const mainCanvas = document.getElementById('mainCanvas');
const bgCtx = bgCanvas.getContext('2d');
const ctx = mainCanvas.getContext('2d');

let width, height;
let time = 0;
let lastTimestamp = performance.now();
let frames = 0;
let lastFpsTime = performance.now();

// Feature Flags & States
let isTimeFrozen = false;
let freezeCooldown = 0;
let flashOpacity = 0;
let currentHands = [];
let matrixDrops = [];
let particles = [];
let ripples = [];
let lasers = [];
let orbActive = false;
let orbSize = 0;

// Input History (for Snaps/Velocity)
let lastPinch = [false, false];
let lastSnapPos = [null, null];

// Theme Definitions
let currentTheme = 'Rainbow';
const palette = {
    'Rainbow':   (t, i, total) => `hsl(${(t * 60 + i * (360/total)) % 360}, 100%, 65%)`,
    'Cyberpunk': (t, i, total) => (i % 2 === 0) ? '#ff003c' : '#00f0ff',
    'Lava':      (t, i, total) => `hsl(${(10 + Math.sin(t)*10 + i*2) % 40}, 100%, 55%)`,
    'Ocean':     (t, i, total) => `hsl(${190 + Math.cos(t)*20 + i*5}, 100%, 60%)`,
    'Galaxy':    (t, i, total) => `hsl(${270 + Math.sin(t*0.5)*50 + i*10}, 100%, 70%)`
};

/**
 * --- INITIALIZATION & UI ---
 */
function setupCanvas() {
    width = window.innerWidth;
    height = window.innerHeight;
    bgCanvas.width = mainCanvas.width = width;
    bgCanvas.height = mainCanvas.height = height;
    
    // Matrix Init
    const columns = Math.floor(width / 20);
    matrixDrops = new Array(columns).fill(1).map(() => Math.random() * -100);
}
window.addEventListener('resize', setupCanvas);
setupCanvas();

document.querySelectorAll('.theme-btn').forEach(btn => {
    btn.onclick = (e) => {
        document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        currentTheme = e.target.dataset.theme;
        const color = palette[currentTheme](0, 1, 1);
        document.documentElement.style.setProperty('--accent', color);
    };
});

document.getElementById('startBtn').onclick = () => {
    document.getElementById('startOverlay').classList.add('hidden');
    document.getElementById('hud').classList.remove('hidden');
    document.getElementById('themes').classList.remove('hidden');
    initAudio();
    initMediaPipe();
    requestAnimationFrame(mainLoop);
};

/**
 * --- AUDIO SYSTEM ---
 */
let audioCtx, humOsc, humGain;

function initAudio() {
    try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        humOsc = audioCtx.createOscillator();
        humGain = audioCtx.createGain();
        humOsc.type = 'sine';
        humOsc.frequency.setValueAtTime(80, audioCtx.currentTime);
        humGain.gain.setValueAtTime(0, audioCtx.currentTime);
        humOsc.connect(humGain);
        humGain.connect(audioCtx.destination);
        humOsc.start();
    } catch(e) {}
}

function playZap(freq = 800, type = 'sawtooth') {
    if(!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.15);
    g.gain.setValueAtTime(0.3, audioCtx.currentTime);
    g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.15);
    osc.connect(g);
    g.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.2);
}

/**
 * --- PHYSICS & MATH ---
 */
const dist = (p1, p2) => Math.hypot(p1.x - p2.x, p1.y - p2.y);
const toScreen = (p) => ({ x: p.x * width, y: p.y * height });

function createParticles(pos, color, amt = 8) {
    for(let i=0; i<amt; i++) {
        particles.push({
            x: pos.x, y: pos.y,
            vx: (Math.random() - 0.5) * 12,
            vy: (Math.random() - 0.5) * 12,
            life: 1.0,
            c: color,
            s: Math.random() * 4 + 2
        });
    }
}

function triggerToast(text) {
    const el = document.getElementById('gesture-toast');
    el.innerText = text;
    el.style.animation = 'none';
    el.offsetHeight; // Reflow
    el.style.animation = 'toastPop 0.6s ease-out';
}

/**
 * --- GESTURE LOGIC ---
 */
function handleGestures() {
    if (!currentHands.length) {
        if(humGain) humGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
        orbActive = false;
        return;
    }

    if(freezeCooldown > 0) freezeCooldown--;

    currentHands.forEach((hand, idx) => {
        const thumb = hand[4], index = hand[8], middle = hand[12], pinky = hand[20], palm = hand[0];
        const screenIndex = toScreen(index);

        // 1. PINCH (Thumb + Index)
        const pDist = dist(thumb, index);
        const isPinching = pDist < 0.05;
        if(isPinching && !lastPinch[idx]) {
            ripples.push({ ...toScreen(thumb), r: 0, m: 250, life: 1, c: '#fff' });
            playZap(600);
            document.getElementById('ui-gesture').innerText = "LINKED";
        }
        lastPinch[idx] = isPinching;

        // 2. THANOS SNAP (Thumb + Middle)
        const sDist = dist(thumb, middle);
        const wasSnapping = lastSnapPos[idx] !== null;
        if (sDist < 0.04) {
            lastSnapPos[idx] = { ...middle };
        } else if (wasSnapping && sDist > 0.1) {
            // Trigger Snap
            flashOpacity = 0.8;
            playZap(1200, 'square');
            triggerToast("SNAP");
            createParticles(toScreen(middle), '#fff', 40);
            lastSnapPos[idx] = null;
        }

        // 3. LASER GUNS
        const isPointing = dist(index, palm) > 0.3 && dist(middle, palm) < 0.15;
        if(isPointing && !isTimeFrozen) {
            lasers.push({ 
                s: toScreen(hand[5]), 
                e: toScreen(index), 
                life: 1, 
                c: palette[currentTheme](time, idx, 2) 
            });
            if(Math.random() > 0.8) playZap(2000, 'sine');
        }

        // 4. TIME FREEZE (Double Hand Spread)
        const spread = dist(index, pinky);
        if(idx === 0) {
            let sVal = Math.min(Math.round(spread * 300), 100);
            document.getElementById('ui-spread').innerText = sVal + "%";
            
            if(sVal > 95 && freezeCooldown === 0) {
                isTimeFrozen = !isTimeFrozen;
                freezeCooldown = 50;
                triggerToast(isTimeFrozen ? "FREEZE" : "RESUME");
                playZap(isTimeFrozen ? 200 : 800);
            }
        }
    });

    // 5. ENERGY ORB (Palms facing)
    if (currentHands.length === 2) {
        const dPalms = dist(currentHands[0][0], currentHands[1][0]);
        if(dPalms < 0.35) {
            orbActive = true;
            orbSize = Math.min(orbSize + 5, 140);
            if(humGain) humGain.gain.setTargetAtTime(0.2, audioCtx.currentTime, 0.1);
        } else {
            orbActive = false;
            orbSize = Math.max(orbSize - 10, 0);
        }
    } else {
        orbSize = Math.max(orbSize - 10, 0);
    }
}

/**
 * --- RENDER PIPELINE ---
 */
function drawMatrix() {
    bgCtx.fillStyle = 'rgba(2, 2, 5, 0.15)';
    bgCtx.fillRect(0, 0, width, height);
    
    if(isTimeFrozen) return;

    bgCtx.font = '15px monospace';
    bgCtx.fillStyle = palette[currentTheme](time, 1, 1);

    matrixDrops.forEach((y, i) => {
        const char = String.fromCharCode(0x30A0 + Math.random() * 96);
        bgCtx.fillText(char, i * 20, y * 20);
        
        if (y * 20 > height && Math.random() > 0.975) matrixDrops[i] = 0;
        matrixDrops[i]++;
    });
}

function updatePhysics() {
    // Particles
    for(let i=particles.length-1; i>=0; i--) {
        const p = particles[i];
        if(!isTimeFrozen) {
            p.x += p.vx; p.y += p.vy;
            p.vy += 0.4; // Gravity
            p.life -= 0.02;
        }
        if(p.life <= 0) particles.splice(i, 1);
        else {
            ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI*2);
            ctx.fillStyle = p.c; ctx.globalAlpha = p.life;
            ctx.fill();
        }
    }

    // Ripples
    for(let i=ripples.length-1; i>=0; i--) {
        const r = ripples[i];
        if(!isTimeFrozen) {
            r.r += (r.m - r.r) * 0.1;
            r.life -= 0.03;
        }
        if(r.life <= 0) ripples.splice(i, 1);
        else {
            ctx.beginPath(); ctx.arc(r.x, r.y, r.r, 0, Math.PI*2);
            ctx.strokeStyle = r.c; ctx.lineWidth = 5 * r.life;
            ctx.globalAlpha = r.life; ctx.stroke();
        }
    }
    ctx.globalAlpha = 1;
}

function mainLoop(ts) {
    const dt = (ts - lastTimestamp) / 1000;
    lastTimestamp = ts;
    if(!isTimeFrozen) time += dt;

    // HUD Stats
    frames++;
    if(ts > lastFpsTime + 1000) {
        document.getElementById('ui-fps').innerText = frames + " FPS";
        frames = 0; lastFpsTime = ts;
    }

    drawMatrix();
    ctx.clearRect(0, 0, width, height);
    ctx.globalCompositeOperation = 'screen';

    handleGestures();
    updatePhysics();

    // Lasers
    lasers = lasers.filter(l => l.life > 0);
    lasers.forEach(l => {
        const dx = l.e.x - l.s.x, dy = l.e.y - l.s.y;
        ctx.beginPath();
        ctx.moveTo(l.s.x, l.s.y);
        ctx.lineTo(l.s.x + dx * 20, l.s.y + dy * 20);
        ctx.strokeStyle = l.c; ctx.lineWidth = 12 * l.life;
        ctx.shadowBlur = 20; ctx.shadowColor = l.c;
        ctx.stroke();
        l.life -= 0.15;
    });

    // Orb
    if(orbSize > 1) {
        const p1 = toScreen(currentHands[0][0]), p2 = toScreen(currentHands[1][0]);
        const mx = (p1.x + p2.x)/2, my = (p1.y + p2.y)/2;
        const grad = ctx.createRadialGradient(mx, my, 0, mx, my, orbSize);
        grad.addColorStop(0, '#fff');
        grad.addColorStop(0.3, palette[currentTheme](time, 1, 1));
        grad.addColorStop(1, 'transparent');
        ctx.fillStyle = grad;
        ctx.beginPath(); ctx.arc(mx, my, orbSize + Math.sin(time*10)*10, 0, Math.PI*2);
        ctx.fill();
    }

    // Hand Skeleton
    currentHands.forEach((hand, hi) => {
        const color = palette[currentTheme](time, hi, currentHands.length);
        drawConnectors(ctx, hand, HAND_CONNECTIONS, { color, lineWidth: 3 });
        
        FINGER_TIPS.forEach((f, fi) => {
            const p = toScreen(hand[f]);
            ctx.shadowBlur = 15; ctx.shadowColor = color;
            ctx.beginPath(); ctx.arc(p.x, p.y, 6, 0, Math.PI*2);
            ctx.fillStyle = '#fff'; ctx.fill();
            if(Math.random() > 0.8 && !isTimeFrozen) createParticles(p, color, 1);
        });
    });

    // Snap Flash
    if(flashOpacity > 0) {
        ctx.fillStyle = `rgba(255,255,255,${flashOpacity})`;
        ctx.fillRect(0, 0, width, height);
        flashOpacity -= 0.04;
    }

    ctx.shadowBlur = 0;
    requestAnimationFrame(mainLoop);
}

function initMediaPipe() {
    const hands = new Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });
    hands.setOptions({
        maxNumHands: 2,
        modelComplexity: 1,
        minDetectionConfidence: 0.6,
        minTrackingConfidence: 0.6
    });
    hands.onResults(res => {
        currentHands = res.multiHandLandmarks || [];
        document.getElementById('ui-hands').innerText = currentHands.length;
    });

    const camera = new Camera(videoElement
