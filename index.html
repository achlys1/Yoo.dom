<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>y.r.s | Pro Engine v4.5</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        :root {
            --bg-color: #010103;
            --accent: #00ffcc;
            --panel-bg: rgba(10, 15, 30, 0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: white;
            overflow: hidden;
            height: 100vh;
        }

        /* Video Layer */
        .viewport { position: absolute; inset: 0; z-index: 1; }
        .input_video { position: absolute; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); filter: brightness(0.4); visibility: hidden; }
        canvas { position: absolute; inset: 0; width: 100%; height: 100%; transform: scaleX(-1); pointer-events: none; }
        #mainCanvas { z-index: 5; }

        /* Navigation UI */
        #hud {
            position: absolute; top: 20px; left: 20px; z-index: 100;
            display: flex; flex-direction: column; gap: 10px; pointer-events: none;
        }
        .panel {
            background: var(--panel-bg); backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
            padding: 12px; border-left: 3px solid var(--accent);
        }
        .stat-val { font-family: monospace; color: var(--accent); font-weight: bold; margin-left: 10px; }

        #themes {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 100; display: flex; gap: 8px; background: var(--panel-bg);
            padding: 8px; border-radius: 50px; backdrop-filter: blur(10px);
        }
        .theme-btn {
            background: transparent; border: none; color: white; padding: 8px 14px;
            border-radius: 20px; font-size: 0.8rem; cursor: pointer;
        }
        .theme-btn.active { background: var(--accent); color: black; font-weight: bold; }

        /* Start Button Fix */
        #startOverlay {
            position: fixed; inset: 0; z-index: 99999;
            background: radial-gradient(circle, #0a0a1a, #010103);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .start-btn {
            padding: 20px 60px; font-size: 1.2rem; background: transparent;
            color: var(--accent); border: 2px solid var(--accent);
            border-radius: 5px; cursor: pointer; letter-spacing: 5px; font-weight: bold;
        }

        .hidden { display: none !important; }
        
        /* Floating Toast */
        #gesture-toast {
            position: fixed; top: 20%; left: 50%; transform: translateX(-50%);
            font-size: 4rem; font-weight: 900; color: white; opacity: 0;
            pointer-events: none; z-index: 1000; -webkit-text-stroke: 1px var(--accent);
        }
        @keyframes pop {
            0% { opacity: 0; transform: translate(-50%, 0) scale(0.8); }
            50% { opacity: 1; transform: translate(-50%, -20px) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -40px) scale(1.1); }
        }
    </style>
</head>
<body>

    <div id="startOverlay">
        <h1 style="letter-spacing: 20px; margin-bottom: 20px;">Y.R.S</h1>
        <p style="color: #666; margin-bottom: 40px;">NAVIGATOR PRO v4.5</p>
        <button class="start-btn" id="startBtn">INITIALIZE</button>
    </div>

    <div id="gesture-toast">SNAP</div>

    <div class="viewport">
        <video class="input_video" autoplay playsinline></video>
        <canvas id="mainCanvas"></canvas>
    </div>

    <div id="hud" class="hidden">
        <div class="panel">
            <div>Engine Status: <span class="stat-val" id="ui-fps">0 FPS</span></div>
            <div>Hand Signal: <span class="stat-val" id="ui-hands">0</span></div>
        </div>
        <div class="panel">
            <div>Active Task: <span class="stat-val" id="ui-gesture">IDLE</span></div>
            <div>Scroll Pos: <span class="stat-val" id="ui-scroll">0%</span></div>
        </div>
    </div>

    <div id="themes" class="hidden">
        <button class="theme-btn active" data-theme="Neon">Neon</button>
        <button class="theme-btn" data-theme="Prism">Prism</button>
        <button class="theme-btn" data-theme="Abyss">Abyss</button>
    </div>

<script>
const videoElement = document.querySelector('.input_video');
const mainCanvas = document.getElementById('mainCanvas');
const ctx = mainCanvas.getContext('2d');

let width, height, time = 0, lastTs = performance.now();
let frames = 0, lastFpsTs = performance.now();
let currentHands = [];
let lasers = [], ripples = [], particles = [];
let lastSnap = [null, null], lastScrollY = null;

let currentTheme = 'Neon';
const palette = {
    'Neon': (t, i) => i % 2 === 0 ? '#00ffcc' : '#ff00cc',
    'Prism': (t, i) => `hsl(${(t * 50 + i * 60) % 360}, 100%, 60%)`,
    'Abyss': (t, i) => i % 2 === 0 ? '#0066ff' : '#003399'
};

function resize() {
    width = window.innerWidth; height = window.innerHeight;
    mainCanvas.width = width; mainCanvas.height = height;
}
window.addEventListener('resize', resize); resize();

document.querySelectorAll('.theme-btn').forEach(btn => {
    btn.onclick = (e) => {
        document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        currentTheme = e.target.dataset.theme;
    }
});

document.getElementById('startBtn').onclick = async () => {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        videoElement.srcObject = stream;
        document.getElementById('startOverlay').classList.add('hidden');
        document.getElementById('hud').classList.remove('hidden');
        document.getElementById('themes').classList.remove('hidden');
        initMediaPipe();
        requestAnimationFrame(loop);
    } catch (e) { alert("Camera Error: Please grant permissions."); }
};

const map = (p) => ({ x: p.x * width, y: p.y * height });
const dist = (p1, p2) => Math.hypot(p1.x - p2.x, p1.y - p2.y);

function toast(txt) {
    const t = document.getElementById('gesture-toast');
    t.innerText = txt; t.style.animation = 'none';
    t.offsetHeight; t.style.animation = 'pop 0.6s ease-out';
}

function loop(ts) {
    const dt = (ts - lastTs) / 1000;
    lastTs = ts; time += dt;

    frames++;
    if(ts > lastFpsTs + 1000) {
        document.getElementById('ui-fps').innerText = frames + " FPS";
        frames = 0; lastFpsTs = ts;
    }

    ctx.clearRect(0,0,width,height);
    ctx.globalCompositeOperation = 'screen';

    // Matrix Rain Lite Background
    ctx.fillStyle = 'rgba(1, 1, 3, 0.2)';
    ctx.fillRect(0,0,width,height);

    currentHands.forEach((hand, i) => {
        const thumb = hand[4], index = hand[8], middle = hand[12], pinky = hand[20], palm = hand[0];
        const color = palette[currentTheme](time, i);

        // 1. PINCH
        if(dist(thumb, index) < 0.05) {
            ctx.beginPath(); ctx.arc(map(thumb).x, map(thumb).y, 30, 0, Math.PI*2);
            ctx.strokeStyle = color; ctx.stroke();
            document.getElementById('ui-gesture').innerText = "CLICK";
        }

        // 2. SNAP
        if(lastSnap[i] && dist(thumb, middle) > 0.1) {
            toast("BOOM!"); lastSnap[i] = null;
        } else if(dist(thumb, middle) < 0.04) lastSnap[i] = true;

        // 3. TABLET NAV (SCROLL)
        // Check if index is near the left edge of the screen (mapped to right due to mirroring)
        const mappedIndex = map(index);
        if (index.x < 0.3) { // Use original 0-1 scale, left third of camera
            document.getElementById('ui-gesture').innerText = "SCROLLING";
            document.getElementById('ui-scroll').innerText = Math.round(index.y * 100) + "%";
            // Drawing a scroll bar UI
            ctx.fillStyle = color;
            ctx.fillRect(width-10, 0, 10, height * index.y);
        }

        // 4. LASER GUN
        if(dist(index, palm) > 0.3 && dist(middle, palm) < 0.1) {
            ctx.beginPath(); ctx.moveTo(map(hand[5]).x, map(hand[5]).y);
            const tip = map(index);
            ctx.lineTo(tip.x + (tip.x - map(hand[5]).x)*15, tip.y + (tip.y - map(hand[5]).y)*15);
            ctx.strokeStyle = color; ctx.lineWidth = 15; ctx.stroke();
        }

        // Draw Skeleton
        drawConnectors(ctx, hand, HAND_CONNECTIONS, {color: color, lineWidth: 2});
        [4,8,12,16,20].forEach(f => {
            const p = map(hand[f]);
            ctx.beginPath(); ctx.arc(p.x, p.y, 5, 0, Math.PI*2);
            ctx.fillStyle = 'white'; ctx.fill();
        });
    });

    requestAnimationFrame(loop);
}

function initMediaPipe() {
    const hands = new Hands({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
    hands.setOptions({
        maxNumHands: 2,
        modelComplexity: 0, // FASTEST MODEL FOR TABLETS
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
    });
    hands.onResults(res => {
        currentHands = res.multiHandLandmarks || [];
        document.getElementById('ui-hands').innerText = currentHands.length;
    });
    new Camera(videoElement, {
        onFrame: async () => await hands.send({image: videoElement}),
        width: 1280, height: 720
    }).start();
}
</script>
</body>
</html>
