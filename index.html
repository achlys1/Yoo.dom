<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>y.r.s | Pro Engine v4.0</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        :root {
            --bg-color: #020205;
            --text-color: #ffffff;
            --glass-bg: rgba(10, 15, 30, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-blur: blur(20px);
            --accent: #00ffcc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* Viewport layering */
        .viewport { position: absolute; inset: 0; z-index: 1; }
        .input_video { position: absolute; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); filter: brightness(0.5); visibility: hidden; }
        canvas { position: absolute; inset: 0; width: 100%; height: 100%; transform: scaleX(-1); pointer-events: none; }
        #bgCanvas { z-index: 2; }
        #mainCanvas { z-index: 3; }

        /* UI Overlays */
        #hud {
            position: absolute; top: 20px; left: 20px; z-index: 10;
            display: flex; flex-direction: column; gap: 10px; pointer-events: none;
        }
        .panel {
            background: var(--glass-bg); backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border); border-radius: 12px;
            padding: 15px; border-left: 4px solid var(--accent);
        }
        .stat-row { display: flex; justify-content: space-between; min-width: 160px; margin-bottom: 5px; font-size: 0.85rem; }
        .stat-value { font-family: monospace; color: var(--accent); font-weight: bold; }

        #themes {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 20; display: flex; gap: 8px; background: var(--glass-bg);
            backdrop-filter: var(--glass-blur); border-radius: 40px; padding: 8px;
        }
        .theme-btn {
            background: transparent; border: none; color: white; padding: 8px 16px;
            border-radius: 20px; cursor: pointer; font-size: 0.8rem; transition: 0.3s;
        }
        .theme-btn.active { background: rgba(255,255,255,0.15); box-shadow: 0 0 10px var(--accent); }

        /* Fixed Start Overlay */
        #startOverlay {
            position: fixed; inset: 0;
            background: radial-gradient(circle at center, #0a0a1a 0%, #020205 100%);
            z-index: 9999; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
        }
        .logo-text { font-size: 4rem; letter-spacing: 15px; margin-bottom: 10px; font-weight: 200; }
        .start-btn {
            padding: 18px 50px; font-size: 1rem; color: white;
            background: transparent; border: 1px solid var(--accent);
            border-radius: 4px; cursor: pointer; letter-spacing: 4px;
            text-transform: uppercase; transition: 0.4s; position: relative; z-index: 10000;
        }
        .start-btn:active { transform: scale(0.95); background: var(--accent); color: black; }

        .hidden { display: none !important; }

        #gesture-toast {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 6rem; font-weight: 900; color: white; opacity: 0;
            pointer-events: none; z-index: 100; -webkit-text-stroke: 2px var(--accent);
        }

        @keyframes pop {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            50% { opacity: 0.8; transform: translate(-50%, -50%) scale(1.1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.2); }
        }
    </style>
</head>
<body>

    <div id="startOverlay">
        <div class="logo-text">Y.R.S</div>
        <p style="margin-bottom: 40px; color: #555; letter-spacing: 2px;">NEURAL ENGINE v4.0</p>
        <button class="start-btn" id="startBtn">Initialize</button>
        <p id="error-log" style="margin-top: 20px; color: #ff4444; font-size: 0.8rem;"></p>
    </div>

    <div id="gesture-toast">SNAP</div>

    <div class="viewport">
        <video class="input_video" autoplay playsinline></video>
        <canvas id="bgCanvas"></canvas>
        <canvas id="mainCanvas"></canvas>
    </div>

    <div id="hud" class="hidden">
        <div class="panel">
            <div class="stat-row"><span>Engine</span><span class="stat-value" id="ui-fps">0 FPS</span></div>
            <div class="stat-row"><span>Hands</span><span class="stat-value" id="ui-hands">0</span></div>
        </div>
        <div class="panel">
            <div class="stat-row"><span>Gesture</span><span class="stat-value" id="ui-gesture">Idle</span></div>
            <div class="stat-row"><span>Spread</span><span class="stat-value" id="ui-spread">0%</span></div>
        </div>
    </div>

    <div id="themes" class="hidden">
        <button class="theme-btn active" data-theme="Rainbow">Prism</button>
        <button class="theme-btn" data-theme="Cyberpunk">Neon</button>
        <button class="theme-btn" data-theme="Lava">Inferno</button>
        <button class="theme-btn" data-theme="Ocean">Abyss</button>
    </div>

<script>
const videoElement = document.querySelector('.input_video');
const bgCanvas = document.getElementById('bgCanvas');
const mainCanvas = document.getElementById('mainCanvas');
const bgCtx = bgCanvas.getContext('2d');
const ctx = mainCanvas.getContext('2d');

let width, height, time = 0, lastTs = performance.now();
let frames = 0, lastFpsTs = performance.now();
let currentHands = [];
let particles = [], ripples = [], lasers = [], matrixDrops = [];
let isTimeFrozen = false, freezeCD = 0, flash = 0, orbSize = 0;
let lastPinch = [false, false], lastSnap = [null, null];

let currentTheme = 'Rainbow';
const palette = {
    'Rainbow': (t, i) => `hsl(${(t * 60 + i * 40) % 360}, 100%, 60%)`,
    'Cyberpunk': (t, i) => i % 2 === 0 ? '#ff003c' : '#00f0ff',
    'Lava': (t, i) => `hsl(${(15 + i * 5) % 45}, 100%, 50%)`,
    'Ocean': (t, i) => `hsl(${190 + i * 10}, 100%, 50%)`
};

function resize() {
    width = window.innerWidth; height = window.innerHeight;
    bgCanvas.width = mainCanvas.width = width;
    bgCanvas.height = mainCanvas.height = height;
    matrixDrops = new Array(Math.floor(width/20)).fill(1).map(() => Math.random() * -50);
}
window.addEventListener('resize', resize);
resize();

// UI Logic
document.querySelectorAll('.theme-btn').forEach(btn => {
    btn.onclick = (e) => {
        document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        currentTheme = e.target.dataset.theme;
    }
});

document.getElementById('startBtn').onclick = async () => {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        videoElement.srcObject = stream;
        document.getElementById('startOverlay').classList.add('hidden');
        document.getElementById('hud').classList.remove('hidden');
        document.getElementById('themes').classList.remove('hidden');
        initAudio();
        initMediaPipe();
        requestAnimationFrame(loop);
    } catch (err) {
        document.getElementById('error-log').innerText = "Camera Access Denied or Not Found.";
        console.error(err);
    }
};

let audioCtx, humOsc, humGain;
function initAudio() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    humOsc = audioCtx.createOscillator();
    humGain = audioCtx.createGain();
    humOsc.frequency.value = 80; humGain.gain.value = 0;
    humOsc.connect(humGain); humGain.connect(audioCtx.destination);
    humOsc.start();
}

function zap(f = 800) {
    if(!audioCtx) return;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.frequency.setValueAtTime(f, audioCtx.currentTime);
    o.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.1);
    g.gain.setValueAtTime(0.2, audioCtx.currentTime);
    g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.1);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + 0.1);
}

const dist = (p1, p2) => Math.hypot(p1.x - p2.x, p1.y - p2.y);
const map = (p) => ({ x: p.x * width, y: p.y * height });

function toast(txt) {
    const el = document.getElementById('gesture-toast');
    el.innerText = txt; el.style.animation = 'none';
    el.offsetHeight; el.style.animation = 'pop 0.6s ease-out';
}

function loop(ts) {
    const dt = (ts - lastTs) / 1000;
    lastTs = ts; if(!isTimeFrozen) time += dt;

    frames++;
    if(ts > lastFpsTs + 1000) {
        document.getElementById('ui-fps').innerText = frames + " FPS";
        frames = 0; lastFpsTs = ts;
    }

    // Matrix
    bgCtx.fillStyle = 'rgba(2, 2, 5, 0.15)';
    bgCtx.fillRect(0,0,width,height);
    if(!isTimeFrozen) {
        bgCtx.font = '15px monospace';
        bgCtx.fillStyle = palette[currentTheme](time, 1);
        matrixDrops.forEach((y, i) => {
            bgCtx.fillText(String.fromCharCode(0x30A0 + Math.random()*96), i*20, y*20);
            if(y*20 > height && Math.random() > 0.98) matrixDrops[i] = 0;
            matrixDrops[i]++;
        });
    }

    ctx.clearRect(0,0,width,height);
    ctx.globalCompositeOperation = 'screen';

    // Gestures
    if(freezeCD > 0) freezeCD--;
    currentHands.forEach((hand, i) => {
        const thumb = hand[4], index = hand[8], middle = hand[12], pinky = hand[20], palm = hand[0];
        
        // Pinch
        if(dist(thumb, index) < 0.05 && !lastPinch[i]) {
            ripples.push({...map(thumb), r:0, m:200, l:1, c:palette[currentTheme](time, 1)});
            zap(600); document.getElementById('ui-gesture').innerText = "PINCH";
        }
        lastPinch[i] = dist(thumb, index) < 0.05;

        // Snap
        if(lastSnap[i] && dist(thumb, middle) > 0.1) {
            flash = 0.7; zap(1200); toast("SNAP"); lastSnap[i] = null;
        } else if(dist(thumb, middle) < 0.05) lastSnap[i] = middle;

        // Laser
        if(dist(index, palm) > 0.3 && dist(middle, palm) < 0.15 && !isTimeFrozen) {
            lasers.push({s:map(hand[5]), e:map(index), l:1, c:palette[currentTheme](time, i)});
            document.getElementById('ui-gesture').innerText = "LASER";
        }

        // Time Freeze
        const sVal = Math.round(dist(index, pinky) * 300);
        if(i === 0) {
            document.getElementById('ui-spread').innerText = sVal + "%";
            if(sVal > 95 && freezeCD === 0) {
                isTimeFrozen = !isTimeFrozen; freezeCD = 50;
                toast(isTimeFrozen ? "FREEZE" : "RESUME"); zap(isTimeFrozen ? 200 : 800);
            }
        }

        // Draw Skeleton
        const col = palette[currentTheme](time, i);
        drawConnectors(ctx, hand, HAND_CONNECTIONS, {color: col, lineWidth: 3});
        FINGER_TIPS.forEach(f => {
            const p = map(hand[f]);
            ctx.beginPath(); ctx.arc(p.x, p.y, 6, 0, Math.PI*2);
            ctx.fillStyle = 'white'; ctx.shadowBlur = 15; ctx.shadowColor = col; ctx.fill();
        });
    });

    // Render Lasers & Flash
    lasers = lasers.filter(l => l.l > 0);
    lasers.forEach(l => {
        ctx.beginPath(); ctx.moveTo(l.s.x, l.s.y);
        ctx.lineTo(l.s.x + (l.e.x-l.s.x)*20, l.s.y + (l.e.y-l.s.y)*20);
        ctx.strokeStyle = l.c; ctx.lineWidth = 10*l.l; ctx.stroke();
        l.l -= 0.1;
    });

    if(flash > 0) {
        ctx.fillStyle = `rgba(255,255,255,${flash})`;
        ctx.fillRect(0,0,width,height); flash -= 0.05;
    }

    requestAnimationFrame(loop);
}

function initMediaPipe() {
    const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
    hands.setOptions({maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.6});
    hands.onResults(res => {
        currentHands = res.multiHandLandmarks || [];
        document.getElementById('ui-hands').innerText = currentHands.length;
    });
    const camera = new Camera(videoElement, {
        onFrame: async () => await hands.send({image: videoElement}),
        width: 1280, height: 720
    });
    camera.start();
}
</script>
</body>
        </html>
