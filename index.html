<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Y.R.S OS v6</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

<style>
body {
    margin: 0;
    background: black;
    color: #00ffcc;
    font-family: monospace;
    overflow: hidden;
}

video {
    position: fixed;
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
    filter: brightness(0.3);
}

canvas {
    position: fixed;
    width: 100%;
    height: 100%;
    transform: scaleX(-1);
}

#cursor {
    position: fixed;
    width: 20px;
    height: 20px;
    border: 2px solid #00ffcc;
    border-radius: 50%;
    pointer-events: none;
    transform: translate(-50%, -50%);
}

#hud {
    position: fixed;
    top: 20px;
    left: 20px;
}

button {
    padding: 10px 20px;
    border: 1px solid #00ffcc;
    background: transparent;
    color: white;
    cursor: pointer;
}

#start {
    position: fixed;
    inset: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    background: black;
}
</style>
</head>

<body>

<div id="start">
    <button onclick="start()">BOOT SYSTEM</button>
</div>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>
<div id="cursor"></div>

<div id="hud">
    <div id="status">LOADING...</div>
</div>

<button id="btn" style="position:fixed;bottom:50px;left:50%;transform:translateX(-50%)">
CLICK ME
</button>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const cursor = document.getElementById("cursor");
const statusText = document.getElementById("status");

let width = window.innerWidth;
let height = window.innerHeight;

canvas.width = width;
canvas.height = height;

let currentHand = null;
let clickCooldown = 0;

// SOUND
const clickSound = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-select-click-1109.mp3");

// START SYSTEM
async function start() {
    document.getElementById("start").style.display = "none";

    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
    video.srcObject = stream;

    initHands();
    loop();
}

// HAND TRACKING
function initHands() {
    const hands = new Hands({
        locateFile: (file) =>
            `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
        maxNumHands: 1,
        modelComplexity: 0,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
    });

    hands.onResults(results => {
        currentHand = results.multiHandLandmarks?.[0] || null;
        statusText.innerText = currentHand ? "TRACKING" : "NO HAND";
    });

    const camera = new Camera(video, {
        onFrame: async () => {
            await hands.send({ image: video });
        },
        width: 640,
        height: 480
    });

    camera.start();
}

// MAIN LOOP
function loop() {
    ctx.clearRect(0, 0, width, height);

    if (currentHand) {
        const index = currentHand[8];
        const thumb = currentHand[4];

        // CURSOR
        const x = (1 - index.x) * width;
        const y = index.y * height;

        cursor.style.left = x + "px";
        cursor.style.top = y + "px";

        // DRAW HAND
        drawConnectors(ctx, currentHand, HAND_CONNECTIONS, {
            color: "#00ffcc",
            lineWidth: 2
        });

        // CLICK
        const distance = Math.hypot(
            thumb.x - index.x,
            thumb.y - index.y
        );

        if (distance < 0.05 && clickCooldown === 0) {
            statusText.innerText = "CLICK";

            const el = document.elementFromPoint(x, y);
            if (el) el.click();

            clickSound.play();
            clickCooldown = 20;
        }

        // SCROLL (peace ✌️)
        const middle = currentHand[12];
        const palm = currentHand[0];
        const pinky = currentHand[20];

        const isPeace =
            Math.abs(index.y - palm.y) > 0.2 &&
            Math.abs(middle.y - palm.y) > 0.2 &&
            Math.abs(pinky.y - palm.y) < 0.1;

        if (isPeace) {
            statusText.innerText = "SCROLL";
            window.scrollBy(0, (palm.y - 0.5) * 50);
        }

        // GEO 🤙
        const isShaka =
            Math.abs(thumb.y - palm.y) > 0.2 &&
            Math.abs(pinky.y - palm.y) > 0.2;

        if (isShaka) {
            statusText.innerText = "GEO";

            navigator.geolocation.getCurrentPosition(pos => {
                alert("Lat: " + pos.coords.latitude);
            });
        }
    }

    if (clickCooldown > 0) clickCooldown--;

    requestAnimationFrame(loop);
}

// BUTTON TEST
document.getElementById("btn").onclick = () => {
    alert("Air Click Works 🚀");
};
</script>

</body>
</html>
